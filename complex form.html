<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>complex form></h2>
    <form>
        <fieldset>
            <legend>personal information</legend>
            <label for="name">name:</label>
            <input type="text"name="name"id="name">
        
    <label for="email">email:</label>
    <input type="email id"name="email id"id="email id">

<label for="tel">phone number</label>
<input type="phone number"name="phone number"id="phone number">
<label for="date of birth">date of birth</label>
<input type="date"name="dateofbirth"id="dateofbirth">
<span>gender</span>
<label for="radio1">male</label>
<input type="radio"name="radio1"id="radio1">
<label for="radio2">female</label>
<input type="radio"name="radio2"id="radio2">
<label for="country">country:</label>
<select name="country" id="country">
    <option value="usa">usa</option>
    <option value="india">india</option>
    <option value="australia">australia</option>
</select>

        </fieldset>
        <fieldset>
            <legend>address </legend>
            <label for="street">street</label>
            <input type="street"name="street"id="street">
            <label for="city">city</label>
            <input type="city"name="city"id="city">
            <label for="state">state</label>
            <input type="state"name="state"id="state">
            <label for="zip code">zip code</label>
            <input type="zip code"name="zip code"id="zip code">
        </fieldset>
        <fieldset> 
            <legend>other information</legend>
            <label for="textarea1">comments:</label>
            <textarea name="textarea1" id="textarea1" cols="30"rows="10"></textarea>
            <label for="terms">i agree to the terms and service</label>
            <input type="checkbox"name="terms"id="terms">

        </fieldset>
        <input type="submit"value="submit">
    </form>
    

</body>
</html>
